<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#128074" />
<title>Dotline — linear notes</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
  html, body { margin: 0; padding: 0; }
  *, *::before, *::after { box-sizing: border-box; }
</style>
</head>
<body>
<style>
  :root {
    --bg: #EBEEF2;
    --surface: #FFFFFF;
    --surface-2: #F4F6F9;
    --ink: #1A1F27;
    --muted: #5B6672;
    --faint: #9AA4B0;
    --hairline: #DCE1E8;
    --line: #128074;          /* green — reserved for the timeline (dots/lines/arrows) */
    --line-strong: #0C6B61;
    --line-soft: rgba(18, 128, 116, 0.14);
    --accent: #6D45D9;        /* purple — all UI accents (buttons, focus, controls) */
    --accent-strong: #5A32C0;
    --danger: #C24B3A;
    --shadow: 0 1px 2px rgba(20, 28, 38, .06), 0 8px 24px rgba(20, 28, 38, .07);
    --radius: 16px;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", monospace;
    /* friendly rounded system font (SF Pro Rounded on Apple) for everything.
       IMPORTANT: no CJK fonts (e.g. Hiragino Maru Gothic) in this stack — they
       have Cyrillic glyphs and would be picked for Russian text, rendering it
       very wide/spaced. Fall straight to system-ui (SF Pro) for full Cyrillic. */
    --sans: ui-rounded, "SF Pro Rounded", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    /* type scale — the single source of truth for every font-size */
    --fs-2xs: 11px;   /* uppercase labels, meta */
    --fs-xs: 12px;    /* fine hints */
    --fs-sm: 13px;    /* captions, buttons, secondary lines */
    --fs-base: 15px;  /* controls, inputs */
    --fs-md: 16px;    /* primary content (item text) */
    --fs-lg: 20px;    /* modal titles, mobile note title */
    --fs-xl: 26px;    /* screen H1, note title */
    --fs-display: 34px; /* modal hero value (the big number you set) */
    /* weights — regular / medium (accent) / semibold (headings) / bold (hero) */
    --w-regular: 400;
    --w-medium: 500;
    --w-semibold: 600;
    --w-bold: 700;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #12161B;
      --surface: #1B212A;
      --surface-2: #222A34;
      --ink: #E7ECF2;
      --muted: #94A0AD;
      --faint: #5F6C7A;
      --hairline: #2A323D;
      --line: #29A99B;
      --line-strong: #34C0B0;
      --line-soft: rgba(41, 169, 155, 0.16);
      --accent: #7C5CF0;
      --accent-strong: #9578F3;
      --danger: #E06A55;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="light"] {
    --bg: #EBEEF2; --surface: #FFFFFF; --surface-2: #F4F6F9; --ink: #1A1F27;
    --muted: #5B6672; --faint: #9AA4B0; --hairline: #DCE1E8; --line: #128074;
    --line-strong: #0C6B61; --line-soft: rgba(18,128,116,.14);
    --accent: #6D45D9; --accent-strong: #5A32C0; --danger: #C24B3A;
    --shadow: 0 1px 2px rgba(20,28,38,.06), 0 8px 24px rgba(20,28,38,.07);
  }
  :root[data-theme="dark"] {
    --bg: #12161B; --surface: #1B212A; --surface-2: #222A34; --ink: #E7ECF2;
    --muted: #94A0AD; --faint: #5F6C7A; --hairline: #2A323D; --line: #29A99B;
    --line-strong: #34C0B0; --line-soft: rgba(41,169,155,.16);
    --accent: #7C5CF0; --accent-strong: #9578F3; --danger: #E06A55;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.35);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  .app {
    max-width: 940px;
    margin: 0 auto;
    padding: 28px 20px 96px;
    min-height: 100%;
  }

  /* ---------- top bar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 26px;
  }
  .icon-btn {
    appearance: none;
    border: 1px solid var(--hairline);
    background: var(--surface);
    color: var(--muted);
    width: 38px; height: 38px;
    border-radius: 10px;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: var(--fs-md);
    transition: color .15s, border-color .15s, transform .1s;
  }
  .icon-btn:hover { color: var(--ink); border-color: var(--faint); }
  .icon-btn:active { transform: scale(.94); }

  /* ---------- auth ---------- */
  .top-actions { display: flex; align-items: center; gap: 10px; }
  .auth-btn {
    appearance: none;
    border: 1px solid var(--hairline); background: var(--surface); color: var(--ink);
    height: 38px; padding: 0 16px; border-radius: 10px; cursor: pointer;
    font-size: var(--fs-sm); font-weight: var(--w-medium);
    transition: border-color .15s, color .15s;
  }
  .auth-btn:hover { border-color: var(--accent); color: var(--accent); }
  .user-wrap { position: relative; }
  .avatar-btn {
    appearance: none;
    display: flex; align-items: center; gap: 8px;
    height: 38px; padding: 3px 12px 3px 4px;
    border: 1px solid var(--hairline); background: var(--surface); color: var(--ink);
    border-radius: 20px; cursor: pointer; font-size: var(--fs-sm); font-weight: var(--w-medium);
    max-width: 220px; transition: border-color .15s;
  }
  .avatar-btn:hover { border-color: var(--faint); }
  .avatar-btn img { width: 30px; height: 30px; border-radius: 50%; flex: none; background: var(--surface-2); }
  .avatar-btn .who { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .avatar-fallback {
    width: 30px; height: 30px; border-radius: 50%; flex: none;
    background: var(--accent); color: #fff; display: grid; place-items: center;
    font-size: var(--fs-sm); font-weight: var(--w-semibold);
  }
  .pop {
    position: absolute; right: 0; top: 46px; z-index: 60;
    background: var(--surface); border: 1px solid var(--hairline);
    border-radius: 12px; box-shadow: var(--shadow); padding: 6px; min-width: 190px;
    animation: fade .16s ease;
  }
  .pop .email {
    padding: 8px 10px 9px; color: var(--muted); font-size: var(--fs-xs);
    border-bottom: 1px solid var(--hairline); margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pop button {
    width: 100%; text-align: left; border: none; background: transparent; color: var(--ink);
    padding: 9px 10px; border-radius: 8px; cursor: pointer; font-size: var(--fs-sm);
  }
  .pop button:hover { background: var(--surface-2); }
  .gpanel {
    position: absolute; right: 0; top: 46px; z-index: 60;
    background: var(--surface); border: 1px solid var(--hairline);
    border-radius: 12px; box-shadow: var(--shadow); padding: 16px;
    animation: fade .16s ease;
  }
  .gpanel .ghint { font-size: var(--fs-xs); color: var(--muted); margin-bottom: 12px; max-width: 240px; line-height: 1.45; }
  .gbtn-holder { min-height: 40px; display: flex; justify-content: center; }
  .sync-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); margin-right: 7px; vertical-align: middle;
    opacity: 0; transition: opacity .2s;
  }
  .sync-dot.on { opacity: 1; }

  /* ---------- home grid ---------- */
  .screen-head { margin-bottom: 18px; }
  .screen-head h1 {
    font-size: var(--fs-xl); font-weight: var(--w-semibold); letter-spacing: -0.02em;
    margin: 0 0 4px;
  }
  .screen-head p { margin: 0; color: var(--muted); font-size: var(--fs-sm); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    padding: 18px;
    cursor: pointer;
    min-height: 168px;
    display: flex; flex-direction: column;
    text-align: left;
    box-shadow: var(--shadow);
    transition: transform .12s, border-color .15s, box-shadow .2s;
    position: relative;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .card .title {
    font-weight: var(--w-semibold); font-size: var(--fs-md); letter-spacing: -0.01em; color: var(--ink);
    margin-bottom: 3px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .meta {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: var(--fs-2xs); color: var(--faint);
    letter-spacing: .03em; text-transform: uppercase;
  }
  .card .mini { margin-top: auto; padding-top: 14px; }
  .card .card-del {
    position: absolute; top: 8px; right: 8px;
    width: 32px; height: 32px; border-radius: 10px;
    border: none; background: transparent; color: var(--faint);
    cursor: pointer; opacity: 0; transition: opacity .12s, color .12s, background .12s;
    display: inline-flex; align-items: center; justify-content: center; font-size: var(--fs-md);
  }
  .card:hover .card-del { opacity: 1; }
  .card-del:hover { color: var(--danger); background: var(--surface-2); }
  /* on touch devices there is no hover, so keep the delete button visible */
  @media (hover: none) {
    .card .card-del { opacity: 1; color: var(--muted); }
  }

  .card.add {
    align-items: center; justify-content: center;
    border-style: dashed; border-color: var(--faint);
    background: transparent; box-shadow: none; color: var(--muted);
    gap: 10px;
  }
  .card.add:hover { border-color: var(--accent); color: var(--accent); }
  .card.add .plus {
    width: 46px; height: 46px; border-radius: 50%;
    border: 2px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: var(--fs-xl); font-weight: var(--w-regular);
    line-height: 46px;
  }
  .card.add .add-label { font-size: var(--fs-sm); font-weight: var(--w-medium); }

  /* ---------- note editor ---------- */
  .editor-head {
    display: flex; align-items: center; gap: 14px; margin-bottom: 22px;
  }
  .back-btn {
    appearance: none; border: 1px solid var(--hairline); background: var(--surface);
    color: var(--muted); border-radius: 10px; height: 38px; padding: 0 14px 0 11px;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    font-size: var(--fs-sm); font-weight: var(--w-medium); transition: color .15s, border-color .15s;
  }
  .back-btn:hover { color: var(--ink); border-color: var(--faint); }
  .note-title {
    font-size: var(--fs-xl); font-weight: var(--w-semibold); letter-spacing: -0.02em;
    border: none; background: transparent; color: var(--ink);
    outline: none; flex: 1; min-width: 0; padding: 4px 6px;
    border-radius: 8px;
    resize: none; overflow: hidden; line-height: 1.25;
    white-space: pre-wrap; word-wrap: break-word;
    field-sizing: content;
    /* use a stack with reliable Cyrillic support for user-entered text */
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  .note-title:focus { background: var(--surface-2); }
  .note-title::placeholder { color: var(--faint); }

  /* editable/user-entered text fields need a Cyrillic-safe font stack */
  .card .title,
  .node-label,
  .node-alias,
  .link-label {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  .board {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 30px 24px 34px;
  }
  @media (max-width: 420px) {
    .board { padding: 22px 16px 26px; }
    .note-title { font-size: var(--fs-lg); }
  }

  /* vertical line with stations — the axis sits a touch LEFT of centre so the
     right-hand labels get more room. One --shift drives rail, dots, pill and "+" */
  .spine { --dot: 34px; --shift: 28px; position: relative; }
  .node, .link { position: relative; z-index: 2; }

  /* rail runs vertically through the exact horizontal center */
  .node::before, .link::before {
    content: "";
    position: absolute;
    left: calc(50% - var(--shift)); transform: translateX(-50%);
    width: 3px; background: var(--line);
    top: 0; bottom: 0;
    z-index: 0;
  }
  .spine > .node:first-of-type::before { top: 50%; }
  .node.ghost::before { display: none; }

  /* SVG overlay used only while dragging a dot to draw the stressed string */
  .spine-wire {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    overflow: visible;
    pointer-events: none;
    z-index: 1; /* drawn under nodes/links so it never covers dots/clocks */
  }
  .spine-wire path {
    fill: none;
    stroke: var(--line);
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke .15s, opacity .2s;
  }
  .spine-wire path.snapping { opacity: 0; }

  /* grid keeps the dot dead-centre while the label lives in the LEFT column
     and wraps freely (no truncation) — the row grows and the line lengthens */
  .node {
    display: grid;
    /* left column shrinks by --shift so the dot lands left of centre; the rail
       above uses the same --shift so line and dots stay perfectly aligned */
    grid-template-columns: calc(50% - var(--shift) - 14px - var(--dot) / 2) auto minmax(0, 1fr);
    align-items: center;
    column-gap: 14px;
    min-height: var(--dot);
    padding: 5px 0;
    transition: transform .18s cubic-bezier(.2,.8,.2,1), opacity .2s;
    touch-action: pan-y;
  }
  .node.dragging { transition: none; }
  .node.wire-hidden::before, .link.wire-hidden::before { opacity: 0; }
  .node.removing { opacity: 0; transform: translateX(var(--snap-dx, 120px)) scale(.9); }
  .node.snap-back { transition: transform .22s cubic-bezier(.2,.8,.2,1); transform: none; }
  .dot {
    grid-column: 2;
    position: relative; z-index: 2;
    width: var(--dot); height: var(--dot);
    border-radius: 50%;
    background: var(--surface);
    border: 3px solid var(--line);
    cursor: pointer; padding: 0;
    /* the dot is a drag handle — take full pointer control so touch swipe-to-delete
       is not swallowed by the browser as a scroll gesture */
    touch-action: none;
    transition: transform .12s, background .15s, border-color .15s, box-shadow .15s;
  }
  .dot:hover { box-shadow: 0 0 0 6px var(--line-soft); }
  .dot:active { transform: scale(.9); }
  .dot:focus-visible { outline: 2px solid var(--line); outline-offset: 3px; }
  .node.done .dot { background: var(--ink); border-color: var(--ink); }

  /* analog clock hands inside reverse dots (div-based, reliable rotation) */
  .clock-hand, .clock-cap {
    position: absolute;
    left: 50%;
    pointer-events: none;
    z-index: 3;
  }
  .clock-hand {
    bottom: 50%;
    width: 2.5px;
    border-radius: 999px;
    background: var(--line);
    transform-origin: bottom center;
    transform: translateX(-50%) rotate(0deg);
    transition: transform .2s;
  }
  .clock-hand.hour { height: 24%; width: 3px; }
  .clock-hand.minute { height: 34%; }
  .clock-cap {
    top: 50%;
    width: 4.5px; height: 4.5px;
    border-radius: 50%;
    background: var(--line);
    transform: translate(-50%, -50%);
  }
  .node.done .clock-hand, .node.done .clock-cap { background: var(--surface); }

  /* alias: small editable number/name to the LEFT of the dot */
  .node-alias {
    grid-column: 1;
    justify-self: end;
    text-align: right;
    max-width: 100%;
    outline: none;
    font-size: var(--fs-xs); font-weight: var(--w-medium); color: var(--ink);
    font-family: var(--sans); font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
    line-height: 1.35;
    padding: 2px 6px; border-radius: 8px;
    cursor: text;
    overflow-wrap: anywhere;
    transition: background .12s, color .12s;
    user-select: text; -webkit-user-select: text;
  }
  .node-alias:hover, .node-alias:focus { background: var(--surface-2); }
  .node-alias.is-auto { color: var(--faint); }
  .spine.reverse .node-alias { font-size: var(--fs-md); font-weight: var(--w-medium); color: var(--ink); cursor: pointer; }
  .node.done .node-alias { color: var(--faint); text-decoration: line-through; }
  .spine.reverse .node.done .node-alias { font-weight: var(--w-medium); }
  .node-alias:empty::before { content: attr(data-ph); color: var(--faint); font-weight: var(--w-regular); }

  /* chronological violation highlight (reverse timeline) */
  .node.chrono-violation .dot { background: var(--danger); border-color: var(--danger); }
  .node.chrono-violation .clock-hand,
  .node.chrono-violation .clock-cap { background: var(--surface); }
  .node.chrono-violation .node-alias { color: var(--danger); }
  .chrono-hint {
    font-size: 10px; font-weight: var(--w-medium);
    color: var(--danger); line-height: 1.2;
    text-transform: uppercase; letter-spacing: 0.02em;
  }

  /* label: main item name to the RIGHT of the dot */
  .node-label {
    grid-column: 3;
    justify-self: start;
    text-align: left;
    max-width: 100%;
    outline: none;
    font-size: var(--fs-md); font-weight: var(--w-medium); color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.35;
    padding: 3px 7px; border-radius: 8px;
    cursor: text;
    overflow-wrap: anywhere; white-space: pre-wrap; /* keep manual line breaks */
    transition: background .12s, color .12s;
    user-select: text; -webkit-user-select: text;
  }
  .node-label:hover, .node-label:focus { background: var(--surface-2); }
  .node-label.is-hint { color: var(--faint); }
  .node.done .node-label { color: var(--faint); text-decoration: line-through; }
  .node-label:empty::before { content: attr(data-ph); color: var(--faint); font-weight: var(--w-regular); }

  /* connector label is a pill centered ON the line */
  .link {
    display: flex; align-items: center; justify-content: center;
    min-height: 88px;
    /* keep the pill centred on the shifted axis */
    padding-right: calc(var(--shift) * 2);
  }
  /* collapsed connector: a small dot on the line; tap it to expand the note field */
  .link-add {
    position: relative; z-index: 2;
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--line); border: none; padding: 0; cursor: pointer;
    box-shadow: 0 0 0 4px var(--surface); /* halo punches the rail so it stands out */
    transition: transform .12s, opacity .15s;
  }
  .link-add:hover { transform: scale(1.3); }
  .link-add:focus-visible { outline: 2px solid var(--line); outline-offset: 4px; }
  /* while dragging a dot to delete, hide the bare connector dot so it doesn't
     hang beside the stretched string (a text label, if any, stays put) */
  .link.wire-hidden .link-add { opacity: 0; }

  /* directional arrow on a timing segment: a CLEAN triangle that terminates the
     line — the shaft runs on the far side only, a surface mask erases the rail
     behind the triangle and in the small gap toward the target dot. Direction
     follows time: down = next later, up = next earlier. */
  .link .arrow { display: none; }
  .link.arr-down .arrow, .link.arr-up .arrow {
    display: block; position: absolute;
    left: calc(50% - var(--shift)); transform: translateX(-50%);
    width: 14px; height: 10px;
    background: var(--surface);   /* board colour — erases the rail here */
    z-index: 1; pointer-events: none;
  }
  /* -4px keeps the mask 1px clear of the dot (dot sits 5px past the link edge) */
  .link.arr-down .arrow { bottom: -4px; }   /* near the lower dot */
  .link.arr-up .arrow   { top: -4px; }       /* near the upper dot */
  .link .arrow::after {
    content: ""; position: absolute; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 6px solid transparent; border-right: 6px solid transparent;
  }
  .link.arr-down .arrow::after { top: 0; border-top: 9px solid var(--line); }   /* tip down */
  .link.arr-up .arrow::after   { bottom: 0; border-bottom: 9px solid var(--line); } /* tip up */
  .link.wire-hidden .arrow { opacity: 0; }
  .link-label {
    position: relative; z-index: 2;
    outline: none;
    font-size: var(--fs-sm); color: var(--muted);
    background: var(--surface);
    padding: 4px 12px; border-radius: 14px;
    border: 1px solid transparent;
    cursor: text;
    max-width: 78%;
    text-align: center; line-height: 1.35;
    overflow-wrap: anywhere;
    transition: border-color .12s, color .12s;
  }
  .link-label:hover, .link-label:focus { border-color: var(--accent); color: var(--ink); }
  .link-label.interval { cursor: pointer; }
  .link-label:empty::before { content: attr(data-ph); color: var(--faint); }

  /* ghost add-node at the very bottom: dashed line + dashed grey circle */
  .link.ghost::before {
    background: repeating-linear-gradient(var(--faint) 0 5px, transparent 5px 11px);
    width: 2px;
  }
  .node.ghost { display: flex; align-items: center; justify-content: center; position: relative; padding-right: calc(var(--shift) * 2); }
  .add-dot {
    position: relative; z-index: 2;
    width: var(--dot); height: var(--dot); border-radius: 50%;
    background: transparent; border: 2px dashed var(--faint);
    color: var(--faint); cursor: pointer; padding: 0;
    display: grid; place-items: center; font-size: var(--fs-md); line-height: 1;
    transition: border-color .15s, color .15s, transform .12s;
  }
  .add-dot:hover { border-color: var(--line); color: var(--line); transform: scale(1.08); }
  .add-dot:focus-visible { outline: 2px solid var(--line); outline-offset: 3px; }
  .ghost-hint {
    position: absolute; left: calc(50% - var(--shift) + 22px);
    font-size: var(--fs-xs); color: var(--faint); white-space: nowrap;
    opacity: 0; transition: opacity .12s; pointer-events: none;
  }
  .node.ghost:hover .ghost-hint { opacity: 1; }

  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }

  /* mini preview on cards */
  .mini svg { display: block; overflow: visible; }
  /* var() doesn't work in SVG attributes — set the preview font via CSS instead */
  .mini svg text { font-family: var(--sans); letter-spacing: 0; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
  .fade-in { animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  /* time picker modal */
  .tp-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10, 14, 20, .22);
    backdrop-filter: blur(7px) saturate(1.1);
    -webkit-backdrop-filter: blur(7px) saturate(1.1);
    display: grid; place-items: center; padding: 18px;
    animation: tp-fade .15s ease;
  }
  .tp-modal {
    position: relative;
    /* frosted-glass panel: slightly translucent over the blurred backdrop */
    background: color-mix(in srgb, var(--surface) 82%, transparent);
    backdrop-filter: blur(30px) saturate(1.5);
    -webkit-backdrop-filter: blur(30px) saturate(1.5);
    border: 1px solid color-mix(in srgb, var(--hairline) 60%, transparent);
    border-radius: 18px;
    padding: 46px 24px 26px; /* generous top room so the × never crowds the hero */
    width: 100%; max-width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,.28);
    animation: tp-pop .18s ease;
  }
  @keyframes tp-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes tp-pop { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: none; } }
  .tp-title { font-size: var(--fs-lg); font-weight: var(--w-semibold); margin-bottom: 18px; }
  .tp-field { margin-bottom: 20px; }
  .tp-label { font-size: var(--fs-2xs); color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .tp-slider { width: 100%; accent-color: var(--accent); }
  /* shared big "hero" value = the thing being set; small sub = its consequence */
  .tp-hero { text-align: center; margin: 0 0 22px; }
  .tp-hero input {
    width: 100%; text-align: center;
    font-size: var(--fs-display); font-weight: var(--w-bold); font-family: var(--sans);
    font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
    border: 1px solid var(--hairline); border-radius: 14px;
    background: var(--surface-2); color: var(--ink);
    padding: 16px 10px; outline: none;
    transition: border-color .12s;
  }
  .tp-hero input:focus { border-color: var(--accent); }
  .tp-sub { margin-top: 4px; font-size: var(--fs-sm); color: var(--muted); font-family: var(--sans); font-weight: var(--w-regular); }
  .tp-date-button {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    height: 44px; border: 1px solid var(--hairline); border-radius: 10px;
    background: var(--surface-2); color: var(--ink);
    font-size: var(--fs-base); cursor: pointer; overflow: hidden;
  }
  .tp-date-input {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0; cursor: pointer; border: none; padding: 0; margin: 0;
  }
  /* close: subtle × top-right (clicking outside also closes) */
  .tp-close {
    position: absolute; top: 12px; right: 12px;
    width: 34px; height: 34px; border-radius: 50%;
    border: none; background: transparent; color: var(--faint);
    font-size: var(--fs-lg); line-height: 1; cursor: pointer;
    display: grid; place-items: center;
    transition: color .12s, background .12s;
  }
  .tp-close:hover { color: var(--ink); background: var(--surface-2); }
  /* apply: one cute round button with just a check */
  .tp-actions { display: flex; justify-content: center; margin-top: 6px; }
  .tp-apply {
    width: 54px; height: 54px; border-radius: 50%;
    border: none; background: var(--accent); color: #fff;
    font-size: var(--fs-xl); line-height: 1; cursor: pointer;
    display: grid; place-items: center;
    transition: transform .12s, background .15s;
  }
  .tp-apply:hover { background: var(--accent-strong); transform: scale(1.06); }
  .tp-apply:active { transform: scale(.94); }
  .tp-apply:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
</style>

<div class="app">
  <div class="topbar">
    <div class="top-actions">
      <div id="authSlot"></div>
      <button class="icon-btn" id="themeBtn" title="Theme" aria-label="Toggle theme">◐</button>
    </div>
  </div>
  <div id="view"></div>
</div>

<script>
(function () {
  const STORE = "dotline.v1";
  const $view = document.getElementById("view");

  // ---------- state ----------
  let db = load();
  function load() {
    try {
      let raw = JSON.parse(localStorage.getItem(STORE));
      if (raw && Array.isArray(raw.notes)) {
        migrateReverseTimes(raw.notes);
        migrateAutoNums(raw.notes);
        return raw;
      }
      // migrate from the old "throughline.v1" key so existing notes survive the rename
      const old = JSON.parse(localStorage.getItem("throughline.v1"));
      if (old && Array.isArray(old.notes)) {
        migrateReverseTimes(old.notes);
        migrateAutoNums(old.notes);
        localStorage.setItem(STORE, JSON.stringify(old));
        return old;
      }
    } catch (e) {}
    // seed with one example note
    return {
      notes: [{
        id: uid(), title: "Morning routine",
        nodes: [
          { id: uid(), name: "Wake up" },
          { id: uid(), name: "" },
          { id: uid(), name: "Coffee" }
        ],
        links: [ { label: "no snooze" }, { label: "" } ]
      }]
    };
  }
  // older reverse notes stored time as minutes-of-day and duration as minutes
  function migrateReverseTimes(notes) {
    notes.forEach(n => {
      if (n.type !== "reverse" || !Array.isArray(n.nodes) || !n.nodes.length) return;
      const today = startOfDay(Date.now());
      n.nodes.forEach(node => {
        if (typeof node.time === "number" && node.time >= 0 && node.time < 1440) {
          node.time = today + node.time * 60000;
        }
      });
      if (n.links) {
        n.links.forEach(link => {
          if (typeof link.duration === "number" && Math.abs(link.duration) < 1440) {
            link.duration = link.duration * 60000;
          }
        });
      }
    });
  }
  // give still-default titles a stable per-type number (fixes old "Timing 1" dupes)
  function migrateAutoNums(notes) {
    let nFree = 0, nRev = 0;
    notes.forEach(x => {
      if (typeof x.autoNum === "number") {
        if (x.type === "reverse") nRev = Math.max(nRev, x.autoNum);
        else nFree = Math.max(nFree, x.autoNum);
      }
    });
    for (let i = notes.length - 1; i >= 0; i--) {   // oldest first
      const x = notes[i];
      if (x.autoTitle && typeof x.autoNum !== "number") {
        const rev = x.type === "reverse";
        x.autoNum = rev ? ++nRev : ++nFree;
        x.title = (rev ? "Timing " : "Dot note ") + x.autoNum;
      }
    }
  }
  function save() {
    localStorage.setItem(STORE, JSON.stringify(db));
    if (auth.user) schedulePush();
  }
  function uid() { return Math.random().toString(36).slice(2, 9); }

  // ---------- server sync ----------
  const API = "/notes/api";
  const auth = { user: null, clientId: "" };
  let pushTimer = null;

  async function api(method, path, body) {
    const r = await fetch(API + path, {
      method,
      credentials: "include",
      headers: body ? { "Content-Type": "application/json" } : {},
      body: body ? JSON.stringify(body) : undefined
    });
    if (!r.ok) { const e = new Error("http " + r.status); e.status = r.status; throw e; }
    return r.status === 204 ? null : r.json();
  }

  function schedulePush() {
    setSync(true);
    clearTimeout(pushTimer);
    pushTimer = setTimeout(async () => {
      try { await api("PUT", "/notes", { notes: db.notes }); } catch (e) {}
      setSync(false);
    }, 700);
  }
  function setSync(on) {
    const d = document.getElementById("syncDot");
    if (d) d.classList.toggle("on", on);
  }

  // ---------- routing ----------
  let route = { name: "home", noteId: null };
  function go(name, noteId) { route = { name, noteId: noteId || null }; render(); }

  function render() {
    if (route.name === "note") renderNote(db.notes.find(n => n.id === route.noteId));
    else renderHome();
  }

  // ---------- home ----------
  function renderHome() {
    const el = document.createElement("div");
    el.innerHTML = `
      <div class="screen-head">
        <h1>Dotline</h1>
        <p>Each note is one line of connected points.</p>
      </div>
      <div class="grid" id="grid"></div>
      <div class="screen-head" style="margin-top: 34px;">
        <h1>Timing Dotlines</h1>
        <p>Events counted from the first: time on the left, name on the right.</p>
      </div>
      <div class="grid" id="reverseGrid"></div>`;
    const freeGrid = el.querySelector("#grid");
    const reverseGrid = el.querySelector("#reverseGrid");

    const freeAdd = document.createElement("button");
    freeAdd.className = "card add";
    freeAdd.innerHTML = `<span class="plus">+</span><span class="add-label">New dot-line</span>`;
    freeAdd.onclick = newNote;
    freeGrid.appendChild(freeAdd);

    const reverseAdd = document.createElement("button");
    reverseAdd.className = "card add";
    reverseAdd.innerHTML = `<span class="plus">+</span><span class="add-label">New timeline</span>`;
    reverseAdd.onclick = newReverseNote;
    reverseGrid.appendChild(reverseAdd);

    db.notes.forEach(n => {
      if (n.type === "reverse") reverseGrid.appendChild(cardFor(n));
      else freeGrid.appendChild(cardFor(n));
    });
    swap(el);
  }

  function cardFor(n) {
    const c = document.createElement("button");
    c.className = "card";
    const count = n.nodes.length;
    const isReverse = n.type === "reverse";
    c.innerHTML = `
      <button class="card-del" title="Delete" aria-label="Delete">✕</button>
      <div class="title">${escapeHtml(n.title || "Untitled")}</div>
      <div class="meta">${count} ${isReverse ? pluralEvent(count) : plural(count)}</div>
      <div class="mini">${miniSvg(n)}</div>`;
    c.onclick = () => go("note", n.id);
    c.querySelector(".card-del").onclick = (e) => {
      e.stopPropagation();
      if (confirm("Delete note \"" + (n.title || "Untitled") + "\"?")) {
        db.notes = db.notes.filter(x => x.id !== n.id); save(); renderHome();
      }
    };
    return c;
  }

  function miniSvg(n) {
    const shown = Math.min(n.nodes.length, 4);
    const gap = 26, top = 6, x = 11, r = 6;
    const h = top + (shown - 1) * gap + 8;
    let s = `<svg width="100%" height="${h}" viewBox="0 0 160 ${h}">`;
    const y0 = top + 2, y1 = top + (shown - 1) * gap + 2;
    s += `<line x1="${x}" y1="${y0}" x2="${x}" y2="${y1}" stroke="var(--line)" stroke-width="2.5"/>`;
    for (let i = 0; i < shown; i++) {
      const cy = top + i * gap + 2;
      const done = n.nodes[i].done;
      s += `<circle cx="${x}" cy="${cy}" r="${r}" fill="${done ? 'var(--ink)' : 'var(--surface)'}" stroke="${done ? 'var(--ink)' : 'var(--line)'}" stroke-width="2.5"/>`;
      const label = n.type === "reverse"
        ? (n.nodes[i].name || formatTime(n.nodes[i].time, startOfDay(n.nodes[0].time)) || String(i + 1))
        : (n.nodes[i].name || n.nodes[i].alias || String(i + 1));
      s += `<text x="${x + 14}" y="${cy + 4}" font-size="11" fill="var(--faint)">${escapeHtml(trunc(label, 16))}</text>`;
    }
    if (n.nodes.length > shown) {
      s += `<text x="${x - 3}" y="${y1 + 16}" font-size="11" fill="var(--faint)">+${n.nodes.length - shown}</text>`;
    }
    s += `</svg>`;
    return s;
  }

  // stable auto-number per type (survives reordering; gaps after delete are fine)
  function isReverse(n) { return n.type === "reverse"; }
  function nextAutoNum(reverse) {
    let max = 0;
    db.notes.forEach(x => {
      if (isReverse(x) === reverse && typeof x.autoNum === "number" && x.autoNum > max) max = x.autoNum;
    });
    return max + 1;
  }
  function autoTitleFor(n) {
    if (typeof n.autoNum !== "number") n.autoNum = nextAutoNum(isReverse(n));
    return (isReverse(n) ? "Timing " : "Dot note ") + n.autoNum;
  }

  function newNote() {
    const n = { id: uid(), type: "free", autoNum: nextAutoNum(false), autoTitle: true,
      nodes: [ { id: uid(), name: "" } ], links: [] };
    n.title = autoTitleFor(n);
    db.notes.unshift(n); save(); go("note", n.id);
  }

  function newReverseNote() {
    const n = { id: uid(), type: "reverse", autoNum: nextAutoNum(true), autoTitle: true,
      nodes: [ { id: uid(), name: "", time: floorMin(Date.now()) } ], links: [] };
    n.title = autoTitleFor(n);
    db.notes.unshift(n); save(); go("note", n.id);
  }

  // ---------- note editor ----------
  function renderNote(n) {
    if (!n) { go("home"); return; }
    if (n.type === "reverse") { renderReverseNote(n); return; }
    const el = document.createElement("div");
    el.innerHTML = `
      <div class="editor-head">
        <button class="back-btn">‹ Notes</button>
        <textarea class="note-title" placeholder="Note title" rows="1"></textarea>
      </div>
      <div class="board"><div class="spine free" id="spine"></div></div>`;
    el.querySelector(".back-btn").onclick = () => go("home");
    const title = el.querySelector(".note-title");
    title.value = n.title || "";
    title.oninput = () => { n.title = title.value; n.autoTitle = false; save(); autoResize(title); };
    // auto-generated title clears on focus so the user never types over "Dot note N"
    title.onfocus = () => {
      if (n.autoTitle) { n.title = ""; title.value = ""; n.autoTitle = false; autoResize(title); }
    };
    title.onblur = () => {
      if (!title.value.trim()) {
        n.autoTitle = true;
        n.title = autoTitleFor(n);
        title.value = n.title;
        save();
        autoResize(title);
      }
    };

    const spine = el.querySelector("#spine");

    swap(el);
    drawSpine(spine, n);
    autoResize(title);
    if (n.autoTitle) setTimeout(() => title.focus(), 0);
  }

  function renderReverseNote(n) {
    if (!n) { go("home"); return; }
    const el = document.createElement("div");
    el.innerHTML = `
      <div class="editor-head">
        <button class="back-btn">‹ Notes</button>
        <textarea class="note-title" placeholder="Timeline title" rows="1"></textarea>
      </div>
      <div class="board"><div class="spine reverse" id="spine"></div></div>`;
    el.querySelector(".back-btn").onclick = () => go("home");
    const title = el.querySelector(".note-title");
    title.value = n.title || "";
    title.oninput = () => { n.title = title.value; n.autoTitle = false; save(); autoResize(title); };
    title.onfocus = () => {
      if (n.autoTitle) { n.title = ""; title.value = ""; n.autoTitle = false; autoResize(title); }
    };
    title.onblur = () => {
      if (!title.value.trim()) {
        n.autoTitle = true;
        n.title = autoTitleFor(n);
        title.value = n.title;
        save();
        autoResize(title);
      }
    };

    const spine = el.querySelector("#spine");

    swap(el);
    drawReverseSpine(spine, n);
    autoResize(title);
    if (n.autoTitle) setTimeout(() => title.focus(), 0);
  }

  function autoResize(ta) {
    ta.style.height = "auto";
    ta.style.height = ta.scrollHeight + "px";
  }

  function drawSpine(spine, n, focusIndex) {
    spine.innerHTML = "";
    const wire = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    wire.classList.add("spine-wire");
    spine.appendChild(wire);

    n.nodes.forEach((node, i) => {
      spine.appendChild(nodeRow(n, node, i, spine));
      if (i < n.nodes.length - 1) spine.appendChild(linkRow(n, i));
    });
    spine.appendChild(ghostRow(n, spine));
    if (focusIndex != null) {
      const labels = spine.querySelectorAll(".node-label");
      const t = labels[focusIndex];
      if (t) { t.classList.add("fade-in"); placeCaretEnd(t); }
    }
  }

  // ghost affordance: dashed connector + dashed grey circle that appends a real node
  function ghostRow(n, spine) {
    const frag = document.createDocumentFragment();
    const link = document.createElement("div");
    link.className = "link ghost";
    const row = document.createElement("div");
    row.className = "node ghost";
    const add = document.createElement("button");
    add.className = "add-dot"; add.textContent = "+";
    add.title = "Add item"; add.setAttribute("aria-label", "Add item");
    const hint = document.createElement("span");
    hint.className = "ghost-hint"; hint.textContent = "add item";
    const doAdd = () => { addNodeAt(n, n.nodes.length - 1); save(); drawSpine(spine, n, n.nodes.length - 1); };
    add.onclick = doAdd;
    row.append(add, hint);
    frag.append(link, row);
    return frag;
  }

  function nodeRow(n, node, i, spine) {
    const row = document.createElement("div");
    row.className = "node" + (node.done ? " done" : "");
    row.dataset.index = i;

    const alias = document.createElement("div");
    alias.className = "node-alias";
    alias.contentEditable = "true";
    alias.spellcheck = false;
    alias.setAttribute("data-ph", String(i + 1));
    setAliasDisplay(alias, node, i);

    alias.onfocus = () => {
      if (alias.classList.contains("is-auto")) {
        alias.textContent = ""; alias.classList.remove("is-auto");
      }
    };
    alias.oninput = () => { node.alias = alias.textContent.trim(); save(); };
    alias.onblur = () => { node.alias = alias.textContent.trim(); setAliasDisplay(alias, node, i); save(); };
    alias.onkeydown = (e) => {
      if (e.key === "Enter") { e.preventDefault(); alias.blur(); }
    };

    const dot = document.createElement("button");
    dot.className = "dot";
    dot.title = "Toggle done. Drag sideways to delete";
    dot.setAttribute("aria-label", "Toggle done");

    const label = document.createElement("div");
    label.className = "node-label";
    label.contentEditable = "true";
    label.spellcheck = false;
    label.setAttribute("data-ph", "item name");
    setNameDisplay(label, node);

    label.onfocus = () => {
      if (label.classList.contains("is-hint")) {
        label.textContent = ""; label.classList.remove("is-hint");
        setTimeout(() => placeCaretEnd(label), 0);
      }
    };
    label.oninput = () => { node.name = label.textContent.trim(); save(); };
    label.onblur = () => { node.name = label.textContent.trim(); setNameDisplay(label, node); save(); };
    label.onkeydown = (e) => {
      // Enter inserts a line break inside the name (multi-line), not a new point
      if (e.key === "Enter") { e.preventDefault(); insertNewlineAtCaret(); node.name = label.textContent.trim(); save(); }
    };

    // keyboard: Enter/Space toggles done, Delete/Backspace removes the node
    dot.onkeydown = (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        node.done = !node.done; save(); row.classList.toggle("done", node.done);
      } else if (e.key === "Delete" || e.key === "Backspace") {
        e.preventDefault();
        removeNode(n, i, spine);
      }
    };

    // swipe-to-delete on the dot: pull sideways like plucking a string
    bindDotDrag(dot, row, n, node, i, spine);

    row.append(alias, dot, label);
    return row;
  }

  function setAliasDisplay(alias, node, i) {
    alias.classList.remove("is-auto");
    if (node.alias && node.alias.length) {
      alias.textContent = node.alias;
    } else {
      alias.textContent = String(i + 1);
      alias.classList.add("is-auto");
    }
  }

  function setNameDisplay(label, node) {
    label.classList.remove("is-hint");
    if (node.name && node.name.length) {
      label.textContent = node.name;
    } else {
      label.textContent = "item name";
      label.classList.add("is-hint");
    }
  }

  function linkRow(n, i) {
    const row = document.createElement("div");
    row.className = "link";
    const hasLabel = !!(n.links[i] && n.links[i].label);
    renderLinkContent(row, n, i, hasLabel);
    return row;
  }

  // free-note connector: collapsed = a small dot; expanded = editable "link note".
  // Empty on blur collapses back so nothing dangles between points.
  function renderLinkContent(row, n, i, expanded) {
    row.innerHTML = "";
    if (expanded) {
      const lab = document.createElement("div");
      lab.className = "link-label";
      lab.contentEditable = "true";
      lab.spellcheck = false;
      lab.setAttribute("data-ph", "link note");
      lab.textContent = (n.links[i] && n.links[i].label) || "";
      lab.oninput = () => { ensureLink(n, i).label = lab.textContent.trim(); save(); };
      lab.onblur = () => {
        const t = lab.textContent.trim();
        ensureLink(n, i).label = t; save();
        if (!t) renderLinkContent(row, n, i, false); // collapse back to the dot
      };
      row.appendChild(lab);
    } else {
      const add = document.createElement("button");
      add.className = "link-add";
      add.title = "Add a note here";
      add.setAttribute("aria-label", "Add a note between points");
      add.onclick = () => {
        renderLinkContent(row, n, i, true);
        const l = row.querySelector(".link-label");
        if (l) placeCaretEnd(l);
      };
      row.appendChild(add);
    }
  }
  function ensureLink(n, i) { if (!n.links[i]) n.links[i] = { label: "" }; return n.links[i]; }

  function addNodeAt(n, i) {
    n.nodes.splice(i + 1, 0, { id: uid(), name: "" });
    n.links.splice(i, 0, { label: "" });
  }

  // shared node removal used by drag-delete, the delete button, and keyboard
  function removeNode(n, i, spine, opts) {
    opts = opts || {};
    if (n.nodes.length <= 1) return;
    if (opts.onDelete) opts.onDelete(i);
    else {
      n.nodes.splice(i, 1);
      n.links.splice(Math.min(i, n.links.length - 1), 1);
      save();
    }
    (opts.draw || drawSpine)(spine, n);
  }

  // ---------- reverse timeline ----------
  function drawReverseSpine(spine, n, focusIndex) {
    spine.innerHTML = "";
    const wire = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    wire.classList.add("spine-wire");
    spine.appendChild(wire);
    updateReverseTimes(n);
    n.nodes.forEach((node, i) => {
      spine.appendChild(reverseNodeRow(n, node, i, spine));
      if (i < n.nodes.length - 1) spine.appendChild(reverseLinkRow(n, i, spine));
    });
    spine.appendChild(reverseGhostRow(n, spine));
    if (focusIndex != null) {
      const labels = spine.querySelectorAll(".node-label");
      const t = labels[focusIndex];
      if (t) { t.classList.add("fade-in"); placeCaretEnd(t); }
    }
  }

  function reverseNodeRow(n, node, i, spine) {
    const row = document.createElement("div");
    row.className = "node" + (node.done ? " done" : "");
    row.dataset.index = i;

    const anchorDay = startOfDay(n.nodes[0].time);
    const alias = document.createElement("div");
    alias.className = "node-alias";
    const timeSpan = document.createElement("span");
    timeSpan.className = "alias-time";
    timeSpan.textContent = formatTime(node.time, anchorDay);
    alias.appendChild(timeSpan);
    if (i >= 2) {
      const d1 = n.nodes[i - 1].time - n.nodes[i - 2].time;
      const d2 = node.time - n.nodes[i - 1].time;
      if (d1 !== 0 && d2 !== 0 && Math.sign(d1) !== Math.sign(d2)) {
        row.classList.add("chrono-violation");
        const hint = document.createElement("div");
        hint.className = "chrono-hint";
        hint.textContent = "out of order";
        alias.appendChild(hint);
      }
    }
    alias.onclick = () => {
      openTimePicker({
        anchorTime: n.nodes[0].time,
        previousTime: i > 0 ? n.nodes[i - 1].time : n.nodes[0].time,
        currentTime: node.time,
        isAnchor: i === 0,
        onApply: (baseTime, duration) => {
          node.time = baseTime;
          if (i > 0 && n.links[i - 1]) n.links[i - 1].duration = duration;
          updateReverseTimes(n);
          save();
          drawReverseSpine(spine, n);
        }
      });
    };
    alias.title = "Click to edit time";

    const dot = document.createElement("button");
    dot.className = "dot";
    dot.title = "Toggle done. Drag sideways to delete";
    dot.setAttribute("aria-label", "Toggle done");

    // analog clock face inside the dot (reverse timeline only)
    const hourHand = document.createElement("div");
    hourHand.className = "clock-hand hour";
    const minuteHand = document.createElement("div");
    minuteHand.className = "clock-hand minute";
    const cap = document.createElement("div");
    cap.className = "clock-cap";
    dot.append(hourHand, minuteHand, cap);
    setClockHands(dot, node.time);

    const label = document.createElement("div");
    label.className = "node-label";
    label.contentEditable = "true";
    label.spellcheck = false;
    label.setAttribute("data-ph", "event");
    setNameDisplay(label, node);

    label.onfocus = () => {
      if (label.classList.contains("is-hint")) {
        label.textContent = ""; label.classList.remove("is-hint");
        setTimeout(() => placeCaretEnd(label), 0);
      }
    };
    label.oninput = () => { node.name = label.textContent.trim(); save(); };
    label.onblur = () => { node.name = label.textContent.trim(); setNameDisplay(label, node); save(); };
    label.onkeydown = (e) => {
      if (e.key === "Enter") { e.preventDefault(); insertNewlineAtCaret(); node.name = label.textContent.trim(); save(); }
    };

    const revOpts = {
      draw: drawReverseSpine,
      onDelete: (i) => {
        if (n.nodes.length <= 1) return;
        if (i > 0 && i < n.links.length) {
          n.links[i-1].duration = (n.links[i-1].duration || 0) + (n.links[i].duration || 0);
        }
        n.nodes.splice(i, 1);
        n.links.splice(Math.min(i, n.links.length - 1), 1);
        updateReverseTimes(n);
        save();
      }
    };

    dot.onkeydown = (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        node.done = !node.done; save(); row.classList.toggle("done", node.done);
      } else if (e.key === "Delete" || e.key === "Backspace") {
        e.preventDefault();
        removeNode(n, i, spine, revOpts);
      }
    };

    bindDotDrag(dot, row, n, node, i, spine, revOpts);

    row.append(alias, dot, label);
    return row;
  }

  function reverseLinkRow(n, i, spine) {
    const row = document.createElement("div");
    // arrow follows time: next later than prev -> points DOWN at the lower dot;
    // next earlier -> points UP at the upper dot; equal -> no arrow
    const dur = n.links[i].duration || 0;
    row.className = "link" + (dur > 0 ? " arr-down" : dur < 0 ? " arr-up" : "");
    const lab = document.createElement("div");
    lab.className = "link-label interval";
    lab.setAttribute("data-ph", "interval");
    lab.textContent = formatDuration(n.links[i].duration || 0);
    lab.onclick = () => {
      openDurationPicker({
        anchorTime: n.nodes[0].time,
        previousTime: n.nodes[i].time,
        currentDuration: n.links[i].duration || 0,
        onApply: (durationMs) => {
          n.links[i].duration = durationMs;
          updateReverseTimes(n);
          save();
          drawReverseSpine(spine, n);
        }
      });
    };
    row.appendChild(lab);
    if (dur !== 0) {
      const arrow = document.createElement("div");
      arrow.className = "arrow";
      row.appendChild(arrow);
    }
    return row;
  }

  function reverseGhostRow(n, spine) {
    const frag = document.createDocumentFragment();
    const link = document.createElement("div");
    link.className = "link ghost";
    const row = document.createElement("div");
    row.className = "node ghost";
    const add = document.createElement("button");
    add.className = "add-dot"; add.textContent = "+";
    add.title = "Add event"; add.setAttribute("aria-label", "Add event");
    const hint = document.createElement("span");
    hint.className = "ghost-hint"; hint.textContent = "add event";
    const doAdd = () => {
      const last = n.nodes[n.nodes.length - 1];
      openTimePicker({
        anchorTime: n.nodes[0].time,
        previousTime: last.time,
        onApply: (baseTime, duration) => {
          n.nodes.push({ id: uid(), name: "", time: baseTime });
          n.links.push({ duration: duration });
          save();
          drawReverseSpine(spine, n, n.nodes.length - 1);
        }
      });
    };
    add.onclick = doAdd;
    row.append(add, hint);
    frag.append(link, row);
    return frag;
  }

  // reverse events use timestamps (ms) so dates beyond "today" are possible
  const MS_MIN = 60000;

  // event times are edited in whole minutes; strip stray seconds/ms so interval
  // deltas come out exact (e.g. -30 min, not -31)
  function floorMin(ts) { return ts - (((ts % MS_MIN) + MS_MIN) % MS_MIN); }

  function startOfDay(ts) {
    const d = new Date(ts || Date.now());
    d.setHours(0, 0, 0, 0);
    return d.getTime();
  }
  function minutesSinceMidnight(ts) {
    const d = new Date(ts);
    return d.getHours() * 60 + d.getMinutes();
  }
  function formatTimeInput(minutes) {
    let h = Math.floor(minutes / 60) % 24;
    if (h < 0) h += 24;
    const m = Math.abs(minutes % 60);
    return (h < 10 ? "0" + h : h) + ":" + (m < 10 ? "0" + m : m);
  }
  function formatDateInput(ts) {
    const d = new Date(ts);
    const tzOffset = d.getTimezoneOffset() * MS_MIN;
    return new Date(ts - tzOffset).toISOString().slice(0, 10);
  }
  function isSameDay(a, b) {
    const d1 = new Date(a), d2 = new Date(b);
    return d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate();
  }

  function parseDuration(s) {
    if (!s) return null;
    s = String(s).trim().toLowerCase().replace(/\s+/g, " ");
    const num = Number(s);
    if (!isNaN(num) && s !== "") return Math.round(num * 60) * MS_MIN;
    let m = s.match(/^(?:\+?\s*)?(\d+)\s*h(?:ours?)?(?:\s*(\d+)\s*m(?:in)?)?$/);
    if (m) return (parseInt(m[1], 10) * 60 + (m[2] ? parseInt(m[2], 10) : 0)) * MS_MIN;
    m = s.match(/^(?:\+?\s*)?(\d+)\s*m(?:in)?(?:utes?)?$/);
    if (m) return parseInt(m[1], 10) * MS_MIN;
    m = s.match(/^(?:\+?\s*)?(\d+)\s*h(?:ours?)?$/);
    if (m) return parseInt(m[1], 10) * 60 * MS_MIN;
    m = s.match(/^(?:\+?\s*)?(\d+)[:\.](\d+)\s*h?$/);
    if (m) return (parseInt(m[1], 10) * 60 + parseInt(m[2], 10)) * MS_MIN;
    return null;
  }

  function formatDuration(ms) {
    let minutes = Math.round(ms / MS_MIN);
    const sign = minutes < 0 ? "-" : "";
    minutes = Math.abs(minutes);
    if (minutes === 0) return "0 min";
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    if (h > 0 && m > 0) return sign + h + " h " + m + " min";
    if (h > 0) return sign + h + " h";
    return sign + m + " min";
  }

  function formatTime(timestamp, anchorDay) {
    const d = new Date(timestamp);
    const h = d.getHours();
    const m = d.getMinutes();
    const timeStr = (h < 10 ? "0" + h : h) + ":" + (m < 10 ? "0" + m : m);
    const ref = anchorDay || startOfDay(Date.now());
    if (isSameDay(timestamp, ref)) return timeStr;
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    return timeStr + " · " + months[d.getMonth()] + " " + d.getDate();
  }

  function setClockHands(dot, timestamp) {
    const d = new Date(timestamp);
    const hourHand = dot.querySelector(".clock-hand.hour");
    const minuteHand = dot.querySelector(".clock-hand.minute");
    const hourAngle = ((d.getHours() % 12) + d.getMinutes() / 60) * 30;
    const minuteAngle = d.getMinutes() * 6;
    if (hourHand) hourHand.style.transform = `translateX(-50%) rotate(${hourAngle}deg)`;
    if (minuteHand) minuteHand.style.transform = `translateX(-50%) rotate(${minuteAngle}deg)`;
  }

  function updateReverseTimes(n) {
    // heal older notes whose anchor still carries seconds/ms
    if (n.nodes[0]) n.nodes[0].time = floorMin(n.nodes[0].time);
    for (let i = 1; i < n.nodes.length; i++) {
      n.nodes[i].time = n.nodes[i-1].time + (n.links[i-1].duration || 0);
    }
  }

  function addReverseNodeAt(n, i) {
    const prevTime = n.nodes[i].time;
    const dur = -30 * MS_MIN; // reverse: next event is 30 min earlier
    n.nodes.splice(i + 1, 0, { id: uid(), name: "", time: prevTime + dur });
    n.links.splice(i, 0, { duration: dur });
  }

  // ---------- time picker modal ----------
  function openTimePicker(opts) {
    const anchorDay = startOfDay(opts.anchorTime);
    const previousTime = opts.previousTime != null ? opts.previousTime : opts.anchorTime;
    const isEdit = opts.currentTime != null;
    const isAnchor = !!opts.isAnchor;
    // a new event defaults to half an hour EARLIER than the previous one
    const currentTime = isEdit ? opts.currentTime : (previousTime - 30 * MS_MIN);
    let selectedDay = startOfDay(currentTime);
    let selectedMin = minutesSinceMidnight(currentTime);

    const overlay = document.createElement("div");
    overlay.className = "tp-overlay";
    const modal = document.createElement("div");
    modal.className = "tp-modal";
    modal.innerHTML = `
      <button class="tp-close" type="button" aria-label="Close">✕</button>
      <div class="tp-hero">
        <input class="tp-hero-time" type="text" inputmode="numeric" value="${formatTimeInput(selectedMin)}" aria-label="Time HH:MM" />
        ${isAnchor ? "" : `<div class="tp-sub"></div>`}
      </div>
      ${isAnchor ? "" : `
      <div class="tp-field">
        <input class="tp-slider" type="range" min="-6" max="6" step="0.25" value="0" />
      </div>`}
      <div class="tp-field tp-date">
        <label class="tp-date-button">
          <span class="tp-date-display">${formatDateLabel(selectedDay)}</span>
          <input class="tp-date-input" type="date" value="${formatDateInput(selectedDay)}" />
        </label>
      </div>
      <div class="tp-actions">
        <button class="tp-apply" type="button" aria-label="Apply">✓</button>
      </div>`;

    const timeInput = modal.querySelector(".tp-hero-time");
    const slider = modal.querySelector(".tp-slider"); // null for the anchor
    const dateInput = modal.querySelector(".tp-date-input");
    const dateDisplay = modal.querySelector(".tp-date-display");
    const sub = modal.querySelector(".tp-sub");

    function formatDateLabel(ts) {
      if (isSameDay(ts, Date.now())) return "Today";
      const d = new Date(ts);
      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      return months[d.getMonth()] + " " + d.getDate();
    }

    // accept "13:30", "1330", "930", "9" etc.
    function readTimeInput() {
      let h, m;
      if (timeInput.value.includes(":")) {
        const [hh, mm] = timeInput.value.split(":");
        h = parseInt(hh, 10); m = parseInt(mm, 10);
      } else {
        const d = timeInput.value.replace(/[^0-9]/g, "");
        if (d.length >= 3) { h = parseInt(d.slice(0, d.length - 2), 10); m = parseInt(d.slice(-2), 10); }
        else { h = parseInt(d, 10); m = 0; }
      }
      if (isNaN(h)) h = 0;
      if (isNaN(m)) m = 0;
      h = Math.max(0, Math.min(23, h));
      m = Math.max(0, Math.min(59, m));
      selectedMin = h * 60 + m;
    }

    function result() { return selectedDay + selectedMin * MS_MIN; }

    // the slider is just a live view of the offset from the point above; the big
    // time and the sub always reflect the same value so nothing fights
    function syncSlider() {
      if (slider) slider.value = Math.max(-6, Math.min(6, (result() - previousTime) / (60 * MS_MIN)));
    }
    function updateSub() {
      if (!sub) return;
      const dur = result() - previousTime;
      const mag = formatDuration(Math.abs(dur));
      sub.textContent = dur === 0 ? "same time" : mag + (dur < 0 ? " earlier" : " later");
    }

    timeInput.oninput = () => { readTimeInput(); syncSlider(); updateSub(); };
    timeInput.onfocus = () => { if (timeInput.select) timeInput.select(); };
    timeInput.onblur = () => { readTimeInput(); timeInput.value = formatTimeInput(selectedMin); syncSlider(); updateSub(); };

    if (slider) slider.oninput = () => {
      const t = previousTime + (parseFloat(slider.value) || 0) * 60 * MS_MIN;
      selectedDay = startOfDay(t);
      selectedMin = minutesSinceMidnight(t);
      timeInput.value = formatTimeInput(selectedMin);
      dateDisplay.textContent = formatDateLabel(selectedDay);
      updateSub();
    };

    dateInput.oninput = () => {
      if (dateInput.value) {
        const [y, mo, d] = dateInput.value.split("-").map(Number);
        selectedDay = new Date(y, mo - 1, d).getTime();
      }
      dateDisplay.textContent = formatDateLabel(selectedDay);
      syncSlider();
      updateSub();
    };

    modal.querySelector(".tp-close").onclick = () => overlay.remove();
    modal.querySelector(".tp-apply").onclick = () => {
      readTimeInput();
      const base = result();
      opts.onApply(base, base - previousTime);
      overlay.remove();
    };

    modal.tabIndex = -1;
    modal.addEventListener("keydown", (e) => {
      e.stopPropagation();
      if (e.key === "Enter") {
        e.preventDefault();
        modal.querySelector(".tp-apply").click();
      } else if (e.key === "Escape") {
        e.preventDefault();
        overlay.remove();
      }
    });

    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    syncSlider();
    updateSub();
    setTimeout(() => timeInput.focus(), 0);
  }

  // ---------- interval picker (reverse timeline) ----------
  function openDurationPicker(opts) {
    const anchorDay = startOfDay(opts.anchorTime);
    const previousTime = opts.previousTime;
    let durationMs = opts.currentDuration || 0;

    const overlay = document.createElement("div");
    overlay.className = "tp-overlay";
    const modal = document.createElement("div");
    modal.className = "tp-modal";
    modal.innerHTML = `
      <button class="tp-close" type="button" aria-label="Close">✕</button>
      <div class="tp-hero">
        <input class="tp-hero-value" type="text" value="${formatDuration(durationMs)}" />
        <div class="tp-sub"></div>
      </div>
      <div class="tp-field">
        <input class="tp-slider" type="range" min="-6" max="6" step="0.25" value="${Math.max(-6, Math.min(6, durationMs / (60 * MS_MIN)))}" />
      </div>
      <div class="tp-actions">
        <button class="tp-apply" type="button" aria-label="Apply">✓</button>
      </div>`;

    const heroInput = modal.querySelector(".tp-hero-value");
    const slider = modal.querySelector(".tp-slider");
    const sub = modal.querySelector(".tp-sub");
    let typing = false;

    function syncSlider() { slider.value = Math.max(-6, Math.min(6, durationMs / (60 * MS_MIN))); }
    function updateSub() { sub.textContent = "→ " + formatTime(previousTime + durationMs, anchorDay); }
    function refreshHero() { if (!typing) heroInput.value = formatDuration(durationMs); }

    slider.oninput = () => {
      durationMs = (parseFloat(slider.value) || 0) * 60 * MS_MIN;
      refreshHero(); updateSub();
    };
    heroInput.onfocus = () => { typing = true; };
    heroInput.oninput = () => {
      // allow a leading minus for the reverse direction (parseDuration is unsigned)
      const s = heroInput.value.trim();
      const neg = /^[-−]/.test(s);
      const parsed = parseDuration(s.replace(/^[-−+]\s*/, ""));
      if (parsed != null) { durationMs = neg ? -parsed : parsed; syncSlider(); updateSub(); }
    };
    heroInput.onblur = () => { typing = false; heroInput.value = formatDuration(durationMs); };

    modal.querySelector(".tp-close").onclick = () => overlay.remove();
    modal.querySelector(".tp-apply").onclick = () => {
      opts.onApply(durationMs);
      overlay.remove();
    };

    modal.tabIndex = -1;
    modal.addEventListener("keydown", (e) => {
      e.stopPropagation();
      if (e.key === "Enter") {
        e.preventDefault();
        modal.querySelector(".tp-apply").click();
      } else if (e.key === "Escape") {
        e.preventDefault();
        overlay.remove();
      }
    });

    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    updateSub();
    setTimeout(() => heroInput.focus(), 0);
  }

  // ---------- swipe-to-delete wire (drawn over CSS rail only while dragging) ----------
  let dragState = null;

  function getDotCenter(row, wire) {
    const dot = row.querySelector(".dot");
    const dr = dot.getBoundingClientRect();
    const wr = wire.getBoundingClientRect();
    return { x: dr.left + dr.width / 2 - wr.left, y: dr.top + dr.height / 2 - wr.top };
  }

  function updateWire(spine, draggedIndex, dx) {
    const wire = spine.querySelector(".spine-wire");
    if (!wire) return;
    wire.innerHTML = "";
    if (dragState == null || dx == null) return;
    const nodes = Array.from(spine.querySelectorAll(".node:not(.ghost)"));
    if (nodes.length < 2) return;
    const threshold = 120;
    const overThreshold = Math.abs(dx) > threshold;
    const i = draggedIndex;

    function pathSeg(a, b) {
      // straight line from the neighbor dot to the dragged dot (two straight segments)
      const d = `M ${a.x},${a.y} L ${b.x},${b.y}`;
      const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
      p.setAttribute("d", d);
      // the further the dot is pulled, the more the string fades out
      const pull = Math.min(Math.abs(dx) / threshold, 1);
      p.style.opacity = String(1 - pull * 0.85);
      if (dragState && dragState.snapping) p.classList.add("snapping");
      return p;
    }

    if (i > 0) {
      const a = getDotCenter(nodes[i - 1], wire);
      const b = getDotCenter(nodes[i], wire);
      wire.appendChild(pathSeg(a, b));
    }
    if (i < nodes.length - 1) {
      const a = getDotCenter(nodes[i], wire);
      const b = getDotCenter(nodes[i + 1], wire);
      wire.appendChild(pathSeg(a, b));
    }
  }

  function bindDotDrag(dot, row, n, node, i, spine, opts = {}) {
    let neighbors = [];
    const doDraw = opts.draw || drawSpine;
    const onPointerDown = (e) => {
      if (e.button !== 0) return;
      e.preventDefault();
      dot.setPointerCapture(e.pointerId);
      row.classList.add("dragging");
      // hide CSS rail segments around the dragged node so SVG string is the only line
      const nodes = Array.from(spine.querySelectorAll(".node:not(.ghost)"));
      const links = Array.from(spine.querySelectorAll(".link:not(.ghost)"));
      neighbors = [row];
      if (i > 0) { neighbors.push(nodes[i - 1]); neighbors.push(links[i - 1]); }
      if (i < nodes.length - 1) { neighbors.push(links[i]); neighbors.push(nodes[i + 1]); }
      neighbors.forEach(el => el.classList.add("wire-hidden"));
      dragState = { row, nodeIndex: i, startX: e.clientX, dx: 0, spine, snapping: false };
      dot.addEventListener("pointermove", onPointerMove);
      dot.addEventListener("pointerup", onPointerUp);
      dot.addEventListener("pointercancel", onPointerUp);
    };
    const onPointerMove = (e) => {
      if (!dragState) return;
      dragState.dx = e.clientX - dragState.startX;
      row.style.setProperty("--snap-dx", dragState.dx + "px");
      row.style.transform = `translateX(${dragState.dx}px)`;
      updateWire(spine, i, dragState.dx);
    };
    const onPointerUp = (e) => {
      if (!dragState) return;
      dot.releasePointerCapture(e.pointerId);
      dot.removeEventListener("pointermove", onPointerMove);
      dot.removeEventListener("pointerup", onPointerUp);
      dot.removeEventListener("pointercancel", onPointerUp);
      neighbors.forEach(el => el.classList.remove("wire-hidden"));
      neighbors = [];
      const dx = dragState.dx;
      const threshold = 120;
      if (Math.abs(dx) > threshold && n.nodes.length > 1) {
        // snap delete
        dragState.snapping = true;
        updateWire(spine, i, dx);
        row.classList.remove("dragging");
        row.classList.add("removing");
        setTimeout(() => {
          dragState = null;
          removeNode(n, i, spine, opts);
        }, 220);
      } else {
        // snap back
        dragState = null;
        row.classList.remove("dragging");
        row.classList.add("snap-back");
        row.style.transform = "";
        updateWire(spine);
        setTimeout(() => row.classList.remove("snap-back"), 250);
        // treat a tiny pull as a click
        if (Math.abs(dx) < 6) {
          node.done = !node.done; save(); row.classList.toggle("done", node.done);
        }
      }
    };
    dot.addEventListener("pointerdown", onPointerDown);
  }

  // ---------- utils ----------
  function swap(el) { $view.innerHTML = ""; $view.appendChild(el); }
  function escapeHtml(s) { return (s || "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])); }
  function escapeAttr(s) { return escapeHtml(s).replace(/"/g, "&quot;"); }
  function trunc(s, n) { return s.length > n ? s.slice(0, n - 1) + "…" : s; }
  function plural(c) { return c === 1 ? "item" : "items"; }
  function pluralEvent(c) { return c === 1 ? "event" : "events"; }
  function placeCaretEnd(node) {
    node.focus();
    const r = document.createRange(); r.selectNodeContents(node); r.collapse(false);
    const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
  }
  // insert a real newline at the caret (Enter → line break inside a point name)
  function insertNewlineAtCaret() {
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    range.deleteContents();
    const tn = document.createTextNode("\n");
    range.insertNode(tn);
    range.setStartAfter(tn); range.collapse(true);
    sel.removeAllRanges(); sel.addRange(range);
  }

  // ---------- theme toggle ----------
  document.getElementById("themeBtn").onclick = () => {
    const cur = document.documentElement.getAttribute("data-theme");
    const isDark = cur ? cur === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute("data-theme", isDark ? "light" : "dark");
  };

  // ---------- auth UI ----------
  const $slot = document.getElementById("authSlot");
  let $open = null; // currently open popover element

  function closePop() { if ($open) { $open.remove(); $open = null; document.removeEventListener("click", outside, true); } }
  function outside(e) { if ($open && !$open.contains(e.target) && !$slot.contains(e.target)) closePop(); }
  function popAnchor(el) {
    closePop(); $open = el; $slot.appendChild(el);
    setTimeout(() => document.addEventListener("click", outside, true), 0);
  }

  function updateAuthUI() {
    $slot.innerHTML = "";
    if (auth.user) {
      const wrap = document.createElement("div"); wrap.className = "user-wrap";
      const btn = document.createElement("button"); btn.className = "avatar-btn";
      const initial = (auth.user.name || auth.user.email || "?").trim().charAt(0).toUpperCase();
      btn.innerHTML =
        `<span class="sync-dot" id="syncDot" title="Saving…"></span>` +
        (auth.user.picture
          ? `<img src="${escapeAttr(auth.user.picture)}" alt="" referrerpolicy="no-referrer" />`
          : `<span class="avatar-fallback">${escapeHtml(initial)}</span>`) +
        `<span class="who">${escapeHtml(auth.user.name || auth.user.email)}</span>`;
      btn.onclick = (e) => {
        e.stopPropagation();
        if ($open) { closePop(); return; }
        const pop = document.createElement("div"); pop.className = "pop";
        pop.innerHTML = `<div class="email">${escapeHtml(auth.user.email)}</div>`;
        const out = document.createElement("button"); out.textContent = "Sign out";
        out.onclick = doLogout;
        pop.appendChild(out);
        popAnchor(pop);
      };
      wrap.appendChild(btn); $slot.appendChild(wrap);
    } else if (auth.clientId) {
      const wrap = document.createElement("div"); wrap.className = "user-wrap";
      const btn = document.createElement("button"); btn.className = "auth-btn"; btn.textContent = "Sign in";
      btn.onclick = (e) => { e.stopPropagation(); if ($open) { closePop(); return; } openLoginPanel(); };
      wrap.appendChild(btn); $slot.appendChild(wrap);
    }
    // if no clientId (backend not configured yet) → no auth control, app stays local-only
  }

  // GSI loads async — wait for it before touching google.accounts
  function googleReady() { return !!(window.google && google.accounts && google.accounts.id); }
  function whenGoogleReady(cb) {
    if (googleReady()) return cb();
    let n = 0;
    const t = setInterval(() => {
      if (googleReady()) { clearInterval(t); cb(); }
      else if (++n > 50) clearInterval(t);
    }, 100);
  }
  function ensureGoogleInit() {
    if (!auth.clientId) return;
    whenGoogleReady(() => google.accounts.id.initialize({ client_id: auth.clientId, callback: onGoogleCredential }));
  }

  function openLoginPanel() {
    const panel = document.createElement("div"); panel.className = "gpanel";
    panel.innerHTML = `<div class="ghint">Sign in with Google to keep your notes synced across devices.</div>
      <div class="gbtn-holder" id="gbtn"></div>`;
    popAnchor(panel);
    const holder = panel.querySelector("#gbtn");
    holder.textContent = "Loading…";
    whenGoogleReady(() => {
      if (!googleReady()) { holder.textContent = "Google sign-in unavailable."; return; }
      holder.textContent = "";
      try {
        google.accounts.id.renderButton(holder,
          { theme: "outline", size: "large", shape: "pill", text: "signin_with", logo_alignment: "center" });
        google.accounts.id.prompt();
      } catch (e) { holder.textContent = "Google sign-in unavailable."; }
    });
  }

  function onGoogleCredential(resp) {
    api("POST", "/auth/google", { credential: resp.credential })
      .then(r => { closePop(); onLoggedIn(r.user, true); })
      .catch(() => alert("Could not sign in. Please try again."));
  }

  async function onLoggedIn(user, justLoggedIn) {
    auth.user = user;
    try {
      const server = await api("GET", "/notes");
      if (server.notes && server.notes.length) {
        db = { notes: server.notes };                       // adopt cloud copy
      } else if (justLoggedIn && db.notes && db.notes.length) {
        await api("PUT", "/notes", { notes: db.notes });    // migrate guest notes up
      } else {
        db = { notes: db.notes || [] };
      }
      localStorage.setItem(STORE, JSON.stringify(db));
    } catch (e) {}
    updateAuthUI();
    go("home");
  }

  async function doLogout() {
    try { await api("POST", "/logout"); } catch (e) {}
    auth.user = null;
    closePop();
    updateAuthUI();
    go("home");
  }

  // expose the GSI callback globally so google can reach it
  window.onGoogleCredential = onGoogleCredential;

  async function boot() {
    render(); // instant local render (guest / cached)
    try {
      const cfg = await api("GET", "/config");
      auth.clientId = cfg.googleClientId || "";
      ensureGoogleInit();
      try {
        const me = await api("GET", "/me");
        if (me && me.user) { await onLoggedIn(me.user, false); }
      } catch (e) { /* 401 → guest */ }
    } catch (e) { /* backend unreachable → local-only mode */ }
    updateAuthUI();
  }

  boot();
})();
</script>
</body>
</html>
